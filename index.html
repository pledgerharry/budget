<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget">
<title>Budget / Harry</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Cg fill='none' stroke='%23fff' stroke-width='1.8' stroke-linejoin='round' stroke-linecap='round'%3E%3Crect x='4' y='8' width='24' height='17' rx='2'/%3E%3Crect x='4' y='5' width='24' height='5' rx='1'/%3E%3Cline x1='9' y1='17' x2='14' y2='17'/%3E%3Ccircle cx='21' cy='17' r='2.5'/%3E%3C/g%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23000'/%3E%3Cg transform='translate(28,42) scale(7.7)' fill='none' stroke='%23fff' stroke-width='1.8' stroke-linejoin='round' stroke-linecap='round'%3E%3Crect x='1' y='2' width='14' height='11' rx='1.5'/%3E%3Crect x='1' y='0' width='14' height='4' rx='1'/%3E%3Cline x1='3' y1='8' x2='6' y2='8'/%3E%3Ccircle cx='11' cy='8' r='1.8'/%3E%3C/g%3E%3C/svg%3E">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <svg class="logo-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" fill="#000"/>
      <g fill="none" stroke="#fff" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round">
        <rect x="4" y="8" width="24" height="17" rx="2"/>
        <rect x="4" y="5" width="24" height="5" rx="1"/>
        <line x1="9" y1="17" x2="14" y2="17"/>
        <circle cx="21" cy="17" r="2.5"/>
      </g>
    </svg>
    <div class="logo-text">Budget <span>/ Harry</span></div>
  </div>
  <div class="sync-badge">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncLabel">loading</span>
  </div>
</header>

<nav>
  <div class="nav-item active" data-page="overview" onclick="showPage('overview')">Overview</div>
  <div class="nav-item" data-page="transactions" onclick="showPage('transactions')">Transactions</div>
  <div class="nav-item" data-page="budget" onclick="showPage('budget')">Budget</div>
  <div class="nav-item" data-page="debt" onclick="showPage('debt')">Debt</div>
  <div class="nav-item" data-page="settings" onclick="showPage('settings')">Settings</div>
</nav>

<!-- OVERVIEW -->
<div class="page active" id="page-overview">
  <div class="overview-bar-wrap">
    <div class="overview-bar-track"><div class="overview-bar-fill" id="overviewBar" style="width:0%"></div></div>
    <div class="overview-bar-label" id="overviewBarLabel">loading...</div>
  </div>
  <div class="add-btn-bar">
    <button class="add-btn" onclick="openSheet()">+ Add transaction</button>
  </div>
  <div class="scroll-area">
    <div class="g4" id="balanceCards" style="margin-bottom:12px"></div>
    <div class="g2" style="margin-bottom:10px">
      <div class="section">
        <div class="section-header"><span class="section-title">This month</span></div>
        <div id="glance"></div>
      </div>
      <div class="section">
        <div class="section-header"><span class="section-title">Debt</span></div>
        <div id="debtMini"></div>
      </div>
    </div>
    <div class="section">
      <div class="section-header"><span class="section-title">Recent activity</span></div>
      <div id="recentList"></div>
    </div>
  </div>
</div>

<!-- TRANSACTIONS -->
<div class="page" id="page-transactions">
  <div class="filter-bar">
    <span class="filter-label">Month</span>
    <select class="month-sel" id="txMonthFilter" onchange="renderTransactions()"></select>
  </div>
  <div class="add-btn-bar" style="padding:8px 20px">
    <button class="add-btn" onclick="openSheet()">+ Add transaction</button>
  </div>
  <div class="scroll-area" style="padding-top:8px">
    <div class="section"><div id="txList"></div></div>
  </div>
</div>

<!-- BUDGET -->
<div class="page" id="page-budget">
  <div class="filter-bar">
    <span class="filter-label">Month</span>
    <select class="month-sel" id="budgetMonthFilter" onchange="renderBudget()"></select>
  </div>
  <div class="scroll-area" style="padding-top:8px">
    <div class="section"><div id="budgetList"></div></div>
  </div>
</div>

<!-- DEBT -->
<div class="page" id="page-debt">
  <div class="scroll-area" style="padding-top:8px">
    <div class="section" id="debtDetail"></div>
    <div class="section-label">Payoff scenarios</div>
    <div class="section"><div id="debtProjection"></div></div>
  </div>
</div>

<!-- SETTINGS -->
<div class="page" id="page-settings">
  <div class="scroll-area" style="padding-top:8px">
    <div class="section-label">Account balances</div>
    <div class="section" style="margin-bottom:10px"><div id="balanceSettings"></div></div>
    <div class="section-label">Monthly budgets</div>
    <div class="section" style="margin-bottom:10px"><div id="budgetSettings"></div></div>
    <button class="btn-danger" onclick="clearAllData()">Clear all transactions</button>
  </div>
</div>

<!-- Sheet overlay -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">Add transaction</div>
  <div class="sheet-tabs">
    <button class="sheet-tab active" data-tab="expense" onclick="setAddTab('expense')">Expense</button>
    <button class="sheet-tab" data-tab="payment" onclick="setAddTab('payment')">Payment</button>
    <button class="sheet-tab" data-tab="income" onclick="setAddTab('income')">Money in</button>
  </div>

  <div class="sheet-panel" data-panel="expense">
    <div class="form-grid">
      <div class="field"><label>Date</label><input type="date" id="eDate"></div>
      <div class="field"><label>Amount £</label><input type="number" id="eAmt" placeholder="0.00" step="0.01" min="0"></div>
    </div>
    <div class="field"><label>Description</label><input type="text" id="eDesc" placeholder="e.g. Greggs, Trainline..."></div>
    <div class="form-grid">
      <div class="field"><label>Category</label><select id="eCat"></select></div>
      <div class="field"><label>Paid from</label><select id="eAcc"></select></div>
    </div>
    <button class="btn-primary" onclick="addExpense()">Add expense</button>
    <button class="btn-ghost" onclick="closeSheet()">Cancel</button>
  </div>

  <div class="sheet-panel" data-panel="payment" style="display:none">
    <div class="form-grid">
      <div class="field"><label>Date</label><input type="date" id="pDate"></div>
      <div class="field"><label>Amount £</label><input type="number" id="pAmt" placeholder="0.00" step="0.01" min="0"></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>From</label><select id="pFrom"></select></div>
      <div class="field"><label>To</label><select id="pTo"></select></div>
    </div>
    <div class="field"><label>Note</label><input type="text" id="pNote" placeholder="e.g. CC payment"></div>
    <button class="btn-primary" onclick="addPayment()">Log payment</button>
    <button class="btn-ghost" onclick="closeSheet()">Cancel</button>
  </div>

  <div class="sheet-panel" data-panel="income" style="display:none">
    <div class="form-grid">
      <div class="field"><label>Date</label><input type="date" id="iDate"></div>
      <div class="field"><label>Amount £</label><input type="number" id="iAmt" placeholder="0.00" step="0.01" min="0"></div>
    </div>
    <div class="form-grid">
      <div class="field"><label>Into account</label><select id="iAcc"></select></div>
      <div class="field"><label>Source</label><input type="text" id="iDesc" placeholder="e.g. Salary"></div>
    </div>
    <button class="btn-primary" onclick="addIncome()">Add money in</button>
    <button class="btn-ghost" onclick="closeSheet()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
